name: Build fcitx5-qt for Qt 6.10.3

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      QT_VERSION: "6.10.3"

    steps:
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt install -y \
          build-essential cmake extra-cmake-modules pkg-config git \
          libxkbcommon-dev libwayland-dev libglib2.0-dev

    # ============================
    # 第一步：必须先编译 fcitx5 本体
    # ============================
    - name: Build & install fcitx5
      run: |
        git clone https://github.com/fcitx/fcitx5.git
        cd fcitx5
        mkdir build && cd build
        cmake .. \
          -DENABLE_TESTING=OFF \
          -DENABLE_WAYLAND=OFF \
          -DENABLE_PANGO=OFF \
          -DENABLE_GTK=OFF \
          -DUSE_YOGA=OFF \
          -Wno-dev
        make -j$(nproc)
        sudo make install

    # ============================
    # 第二步：再编译 fcitx5-qt
    # ============================
    - name: Build & install fcitx5-qt
      run: |
        git clone https://github.com/fcitx/fcitx5-qt.git
        cd fcitx5-qt
        mkdir build && cd build
        cmake .. \
          -DCMAKE_PREFIX_PATH="$Qt6_DIR;/usr/local" \
          -DENABLE_QT6=ON \
          -DENABLE_QT5=OFF \
          -DBUILD_TESTING=OFF
        make -j$(nproc)
        sudo make install

    # ============================
    # 输出你要的插件
    # ============================
    - name: Upload plugin
      uses: actions/upload-artifact@v4
      with:
        name: fcitx5-qt6-plugin
        path: /usr/local/lib/qt6/plugins/platforminputcontexts/libfcitx5platforminputcontextplugin.so