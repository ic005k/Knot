jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      QT_VERSION: "6.10.3"

    steps:
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}

    - name: Install system dependencies (no PPA)
      run: |
        sudo apt-get update
        sudo apt install -y \
          build-essential cmake extra-cmake-modules pkg-config \
          libxkbcommon-dev libwayland-dev git

    - name: Build fcitx5-qt from source (Qt6)
      run: |
        git clone https://github.com/fcitx/fcitx5-qt.git
        cd fcitx5-qt
        mkdir build && cd build
        cmake .. \
          -DCMAKE_PREFIX_PATH="$Qt6_DIR;/usr" \
          -DENABLE_QT6=ON -DENABLE_QT5=OFF
        make -j$(nproc)
        sudo make install

    - name: Build Knot
      run: |
        # 你的 Knot 编译命令，直接用，现在系统里已经有 fcitx5-qt 的头文件和库了
        mkdir build && cd build
        cmake .. -DCMAKE_PREFIX_PATH="$Qt6_DIR"
        make -j$(nproc)