name: Build fcitx5-qt for Qt 6.10.3

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      QT_VERSION: "6.10.3"

    steps:
    - name: Install Qt 6.10.3
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        modules: qtcharts qtlocation qtmultimedia qtpositioning

    - name: 添加 fcitx 官方 PPA + 安装全部依赖
      run: |
        sudo apt-get update
        sudo add-apt-repository -y ppa:fcitx-team/nightly
        sudo apt-get update
        sudo apt install -y \
          build-essential \
          cmake \
          extra-cmake-modules \
          pkg-config \
          libfcitx5core-dev \
          libfcitx5config-dev \
          libfcitx5utils-dev \
          libfcitx5-qt-dev \
          libxkbcommon-dev \
          libwayland-dev

    - name: 拉取 fcitx5-qt 源码
      uses: actions/checkout@v4
      with:
        repository: fcitx/fcitx5-qt
        path: fcitx5-qt

    - name: 编译 fcitx5-qt (Qt6 专用)
      working-directory: fcitx5-qt
      run: |
        mkdir -p build && cd build
        rm -rf *
        cmake .. \
          -DCMAKE_INSTALL_RPATH="$ORIGIN" \
          -DCMAKE_PREFIX_PATH="$Qt6_DIR;/usr" \
          -DENABLE_QT6=ON \
          -DENABLE_QT5=OFF \
          -DBUILD_SHARED_LIBS=OFF
        make -j$(nproc)

    - name: 上传编译好的插件文件
      uses: actions/upload-artifact@v4
      with:
        name: fcitx5-qt6-plugin
        path: |
          fcitx5-qt/build/qt/platforminputcontext/libfcitx5platforminputcontextplugin.so
          fcitx5-qt/build/qt/addons/fcitx5-qt6-immodule.so