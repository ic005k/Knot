name: Build fcitx5-qt for Qt 6.10.3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      QT_VERSION: "6.10.3"
      QT_ARCH: "gcc_64"

    steps:
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        modules: qtcharts qtlocation qtmultimedia qtpositioning

    - name: Install system deps
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake extra-cmake-modules \
          pkg-config fcitx5 libfcitx5-qt-dev \
          libxkbcommon-dev libwayland-dev

    - name: Checkout fcitx5-qt
      uses: actions/checkout@v4
      with:
        repository: fcitx/fcitx5-qt
        path: fcitx5-qt

    - name: Build fcitx5-qt (Qt6 only)
      working-directory: fcitx5-qt
      run: |
        mkdir build && cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH=$QT_ROOT_DIR \
          -DENABLE_QT5=OFF \
          -DENABLE_QT6=ON \
          -DBUILD_TESTING=OFF
        make -j$(nproc)

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: fcitx5-qt6-qt-6.10.3
        path: |
          fcitx5-qt/build/qt6/platforminputcontext/libfcitx5platforminputcontextplugin.so
          fcitx5-qt/build/qt6/dbusaddons/libFcitx5Qt6DBusAddons.so*