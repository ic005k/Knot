name: Build fcitx5-qt for Qt 6.10.3

# 保留自动触发（成功后你再删）
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      QT_VERSION: "6.10.3"

    steps:
    - name: Install Qt 6.10.3
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}

    - name: 安装基础编译依赖
      run: |
        sudo apt-get update
        sudo apt install -y \
          build-essential \
          cmake \
          extra-cmake-modules \
          pkg-config \
          git \
          libglib2.0-dev \
          libxkbcommon-dev \
          libwayland-dev

    # ==============================================
    # 第一步：编译 fcitx5 本体（你本地做过这一步）
    # ==============================================
    - name: 编译并安装 fcitx5 核心
      run: |
        git clone https://github.com/fcitx/fcitx5.git
        cd fcitx5
        mkdir build && cd build
        cmake .. \
          -DENABLE_TESTING=OFF \
          -DENABLE_WAYLAND=OFF \
          -DENABLE_PANGO=OFF \
          -DENABLE_GTK=OFF \
          -DUSE_YOGA=OFF \
          -Wno-dev
        make -j$(nproc)
        sudo make install

    # ==============================================
    # 第二步：编译 fcitx5-qt 插件（你要的文件）
    # ==============================================
    - name: 编译 fcitx5-qt (Qt6)
      run: |
        git clone https://github.com/fcitx/fcitx5-qt.git
        cd fcitx5-qt
        mkdir build && cd build
        cmake .. \
          -DCMAKE_PREFIX_PATH="$Qt6_DIR;/usr/local" \
          -DENABLE_QT6=ON \
          -DENABLE_QT5=OFF \
          -DBUILD_TESTING=OFF
        make -j$(nproc)
        sudo make install

    # ==============================================
    # 上传你需要的插件文件
    # ==============================================
    - name: 上传编译好的输入法插件
      uses: actions/upload-artifact@v4
      with:
        name: fcitx5-qt6-plugin
        path: /usr/local/lib/qt6/plugins/platforminputcontexts/libfcitx5platforminputcontextplugin.so