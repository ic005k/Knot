name: Build fcitx5-qt for Qt 6.10.3

# 保留自动触发（成功后你再删除）
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      QT_VERSION: "6.10.3"

    steps:
    - name: Install Qt 6.10.3
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        modules: qtcharts qtlocation qtmultimedia qtpositioning

    - name: Install base dependencies
      run: |
        sudo apt-get update
        sudo apt install -y \
          build-essential \
          cmake \
          extra-cmake-modules \
          pkg-config \
          git \
          libxkbcommon-dev \
          libwayland-dev

    # ==============================
    # 关键：直接源码编译 fcitx5-qt
    # 完全和你本地成功方式一样！
    # ==============================
    - name: Build & install fcitx5-qt
      run: |
        git clone https://github.com/fcitx/fcitx5-qt.git
        cd fcitx5-qt
        mkdir build && cd build
        cmake .. \
          -DCMAKE_PREFIX_PATH="$Qt6_DIR" \
          -DENABLE_QT6=ON \
          -DENABLE_QT5=OFF \
          -DBUILD_TESTING=OFF
        make -j$(nproc)
        sudo make install

    - name: Upload compiled plugin
      uses: actions/upload-artifact@v4
      with:
        name: fcitx5-qt6-plugin
        path: |
          /usr/local/lib/qt6/plugins/platforminputcontexts/libfcitx5platforminputcontextplugin.so