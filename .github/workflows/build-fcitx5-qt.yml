name: Build fcitx5-qt for Qt 6.10.3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      QT_VERSION: "6.10.3"
      QT_ARCH: "gcc_64"
      FCITX5_PREFIX: "/usr/local"

    steps:
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        modules: qtcharts qtlocation qtmultimedia qtpositioning

    - name: Install system base deps (apt official)
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          extra-cmake-modules \
          pkg-config \
          git \
          libxkbcommon-dev \
          libwayland-dev \
          libglib2.0-dev \
          libdbus-1-dev \
          libxcb1-dev \
          libxcb-randr0-dev \
          libxcb-image0-dev \
          libxcb-util0-dev \
          libxcb-keysyms1-dev \
          libxcb-xinerama0-dev \
          libuv1-dev \
          libsystemd-dev \
          gettext \
          qt6-base-dev

    - name: Build & install fcitx5 core from source
      run: |
        git clone https://github.com/fcitx/fcitx5.git
        cd fcitx5
        mkdir build && cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=${{ env.FCITX5_PREFIX }} \
          -DENABLE_TESTING=OFF
        make -j$(nproc)
        sudo make install
        # 让后续 cmake 能找到 fcitx5
        echo "${{ env.FCITX5_PREFIX }}/lib/x86_64-linux-gnu" | sudo tee /etc/ld.so.conf.d/fcitx5.conf
        sudo ldconfig

    - name: Checkout fcitx5-qt
      uses: actions/checkout@v4
      with:
        repository: fcitx/fcitx5-qt
        path: fcitx5-qt

    - name: Build fcitx5-qt (Qt6 only, link to self-built fcitx5)
      working-directory: fcitx5-qt
      run: |
        mkdir build && cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH=$Qt6_DIR \
          -DCMAKE_INSTALL_PREFIX=${{ env.FCITX5_PREFIX }} \
          -DENABLE_QT5=OFF \
          -DENABLE_QT6=ON \
          -DBUILD_TESTING=OFF
        make -j$(nproc)

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: fcitx5-qt6-qt-6.10.3
        path: |
          fcitx5-qt/build/qt6/platforminputcontext/libfcitx5platforminputcontextplugin.so
          fcitx5-qt/build/qt6/dbusaddons/libFcitx5Qt6DBusAddons.so*