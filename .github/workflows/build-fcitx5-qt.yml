name: Build fcitx5-qt for Qt 6.10.3

# 暂时保留自动触发，成功后你自己删除 push / pull_request 即可
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      QT_VERSION: "6.10.3"

    steps:
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        modules: qtcharts qtlocation qtmultimedia qtpositioning

    - name: Install dependencies (完全按你本地成功的版本)
      run: |
        sudo apt-get update
        sudo apt install -y \
          build-essential \
          cmake \
          extra-cmake-modules \
          pkg-config \
          libfcitx5-dev \
          libfcitx5-qt-dev \
          libwayland-dev \
          libwayland-egl-backend-dev \
          libwayland-cursor-dev \
          libwayland-egl-dev \
          libwayland-server-dev \
          libxkbcommon-dev \
          libvulkan-dev \
          mesa-common-dev \
          vulkan-validationlayers-dev

    - name: Checkout fcitx5-qt
      uses: actions/checkout@v4
      with:
        repository: fcitx/fcitx5-qt
        path: fcitx5-qt

    - name: Build fcitx5-qt (和你本地命令完全一致)
      working-directory: fcitx5-qt
      run: |
        mkdir -p build && cd build
        rm -rf *
        cmake .. \
          -DCMAKE_INSTALL_RPATH="$ORIGIN" \
          -DCMAKE_PREFIX_PATH="$Qt6_DIR;/usr" \
          -DENABLE_QT6=ON \
          -DENABLE_QT5=OFF \
          -DBUILD_SHARED_LIBS=OFF
        make -j$(nproc)

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: fcitx5-qt6-qt-6.10.3
        path: |
          fcitx5-qt/build/qt6/platforminputcontext/libfcitx5platforminputcontextplugin.so
          fcitx5-qt/build/qt6/dbusaddons/libFcitx5Qt6DBusAddons.so*