name: Build fcitx5-qt for Qt 6.10.3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      QT_VERSION: "6.10.3"
      FCITX5_PREFIX: "/usr/local"

    steps:
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ env.QT_VERSION }}
        modules: qtcharts qtlocation qtmultimedia qtpositioning

    - name: Install ALL dependencies 最终完整版
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          extra-cmake-modules \
          pkg-config \
          git \
          gettext \
          libuv1-dev \
          libsystemd-dev \
          libxkbcommon-dev \
          libxkbcommon-x11-dev \
          libwayland-dev \
          libglib2.0-dev \
          libdbus-1-dev \
          libxcb1-dev \
          libxcb-randr0-dev \
          libxcb-image0-dev \
          libxcb-util0-dev \
          libxcb-keysyms1-dev \
          libxcb-xinerama0-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxcb-ewmh-dev \
          libxcb-icccm4-dev \
          libxcb-imdkit-dev \
          libcairo2-dev \
          libexpat1-dev \
          libx11-dev \
          qt6-base-dev \
          nlohmann-json3-dev

    - name: Build & install xcb-imdkit
      run: |
        git clone https://github.com/fcitx/xcb-imdkit.git
        cd xcb-imdkit
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=${{ env.FCITX5_PREFIX }}
        make -j$(nproc)
        sudo make install
        sudo ldconfig

    - name: Build & install fcitx5 core
      run: |
        git clone https://github.com/fcitx/fcitx5.git
        cd fcitx5
        mkdir build && cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=${{ env.FCITX5_PREFIX }} \
          -DENABLE_TESTING=OFF
        make -j$(nproc)
        sudo make install
        sudo ldconfig

    - name: Checkout fcitx5-qt
      uses: actions/checkout@v4
      with:
        repository: fcitx/fcitx5-qt
        path: fcitx5-qt

    - name: Build fcitx5-qt (Qt6 only)
      working-directory: fcitx5-qt
      run: |
        mkdir build && cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_PREFIX_PATH=$Qt6_DIR \
          -DENABLE_QT5=OFF \
          -DENABLE_QT6=ON \
          -DBUILD_TESTING=OFF
        make -j$(nproc)

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: fcitx5-qt6-qt-6.10.3
        path: |
          fcitx5-qt/build/qt6/platforminputcontext/libfcitx5platforminputcontextplugin.so
          fcitx5-qt/build/qt6/dbusaddons/libFcitx5Qt6DBusAddons.so*